<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phonk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body class="section-page bg-phonk">
    <div class="section-overlay"></div>
    <div class="uploader-wrap">
        <div class="uploader" role="region" aria-label="Upload MP3">
            <div class="icon" aria-hidden="true">🎵</div>
            <div class="text dropzone">
                <div>
                    <p class="title">Upload your MP3</p>
                    <p class="subtitle">Drag & drop your file here, or click Browse</p>
                </div>
            </div>
            <div class="actions">
                <button class="btn secondary" onclick="location.href='index.html'">Back</button>
                <button class="btn primary" data-browse>Browse</button>
                <input type="file" accept="audio/mpeg,audio/mp3" />
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
