<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Mantis - Sections</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body class="home">
    <header class="site-header">
        <h1 class="site-title">Explore Sounds</h1>
        <p class="site-subtitle">Choose a vibe to dive into</p>
    </header>

    <main class="container">
        <section class="cards" aria-label="Sections">
            <a class="card phonk" href="phonk.html" aria-label="Go to Phonk">
                <div class="card-bg"></div>
                <div class="card-content">
                    <img class="card-logo" src="images/phonk-logo.png" alt="Phonk logo" />
                    <div class="card-meta">
                        <span class="card-number">01</span>
                        <h2 class="card-title">Phonk</h2>
                    </div>
                    <span class="card-cta">Explore</span>
                </div>
            </a>

            <a class="card melody" href="melody.html" aria-label="Go to Melody">
                <div class="card-bg"></div>
                <div class="card-content">
                    <img class="card-logo" src="images/melody-logo.png" alt="Melody logo" />
                    <div class="card-meta">
                        <span class="card-number">02</span>
                        <h2 class="card-title">Melody</h2>
                    </div>
                    <span class="card-cta">Explore</span>
                </div>
            </a>

            <a class="card lofi" href="lofi.html" aria-label="Go to Lo-Fi">
                <div class="card-bg"></div>
                <div class="card-content">
                    <img class="card-logo" src="images/lofi-logo.png" alt="Lo-Fi logo" />
                    <div class="card-meta">
                        <span class="card-number">03</span>
                        <h2 class="card-title">Lo-Fi</h2>
                    </div>
                    <span class="card-cta">Explore</span>
                </div>
            </a>

            <a class="card eightd" href="8d.html" aria-label="Go to 8D">
                <div class="card-bg"></div>
                <div class="card-content">
                    <img class="card-logo" src="images/8d-logo.png" alt="8D logo" />
                    <div class="card-meta">
                        <span class="card-number">04</span>
                        <h2 class="card-title">8D</h2>
                    </div>
                    <span class="card-cta">Explore</span>
                </div>
            </a>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
